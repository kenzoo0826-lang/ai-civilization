<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIと創る文明 Ver.0.9</title>

<style>
*{box-sizing:border-box;}

html,body{
 margin:0;
 font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
 background:#0e1117;
 color:#fff;
 touch-action:manipulation;
 -webkit-text-size-adjust:100%;
 overscroll-behavior:none;
 user-select:none;
}

#app{
 min-height:100vh;
 display:grid;
 grid-template-columns:1.2fr 1fr;
 gap:16px;
 padding:16px;
}

.panel{
 background:#171b24;
 border:1px solid #2a3140;
 padding:16px;
 border-radius:18px;
 box-shadow:0 10px 28px rgba(0,0,0,.28);
}

h1,h2,h3{margin-top:0;}

.subtitle{
 color:#aab3c5;
 line-height:1.6;
}

.resources{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.resource{
 background:#222838;
 border:1px solid #30384a;
 padding:12px;
 border-radius:14px;
}

.label{
 color:#aab3c5;
 font-size:13px;
}

.value{
 font-size:26px;
 font-weight:900;
 margin-top:4px;
}

button{
 width:100%;
 margin-top:10px;
 padding:14px;
 border:none;
 border-radius:14px;
 color:#fff;
 font-weight:900;
 font-size:15px;
 cursor:pointer;
 touch-action:manipulation;
 -webkit-tap-highlight-color:transparent;
 user-select:none;
}

button:active{transform:scale(.98);}

button:disabled{
 background:#3a3f4b!important;
 color:#8d94a3;
}

.main{background:linear-gradient(135deg,#4f8cff,#6d5dfc);}
.sub{background:linear-gradient(135deg,#2f81f7,#4f8cff);}
.warn{background:linear-gradient(135deg,#d73a49,#ff7b72);}
.reward{background:linear-gradient(135deg,#f0ad4e,#ffcf66);color:#1b1300;}

.info-box{
 background:#101620;
 border:1px solid #283246;
 border-radius:14px;
 padding:14px;
 margin-bottom:12px;
}

.progress{
 height:18px;
 background:#111722;
 border:1px solid #30384a;
 border-radius:999px;
 overflow:hidden;
 margin:8px 0;
}

.bar{
 height:100%;
 width:0%;
 background:linear-gradient(90deg,#4f8cff,#8be9fd);
 transition:width .2s;
}

.mission-card{
 background:#131a26;
 border:1px solid #33415a;
 border-radius:14px;
 padding:14px;
 margin-top:10px;
}

.mission-title{
 font-size:17px;
 font-weight:900;
 color:#8be9fd;
}

.mission-reward{
 color:#ffcf66;
 font-weight:900;
 margin-top:6px;
}

.ai{
 border-left:4px solid #4f8cff;
 padding-left:12px;
 line-height:1.7;
 color:#dce7ff;
}

.log{
 height:150px;
 overflow-y:auto;
 background:#0f131b;
 padding:10px;
 border-radius:12px;
 color:#cfd6e6;
 line-height:1.6;
 font-size:14px;
}

.popup{
 position:absolute;
 color:#8be9fd;
 font-weight:900;
 pointer-events:none;
 animation:pop .8s forwards;
 z-index:999;
}

@keyframes pop{
 0%{transform:translateY(0);opacity:1;}
 100%{transform:translateY(-42px);opacity:0;}
}

.blink{
 animation:blink 1s infinite;
}

@keyframes blink{
 0%{filter:brightness(1);}
 50%{filter:brightness(1.55);}
 100%{filter:brightness(1);}
}

.flash{
 animation:flash .25s;
}

@keyframes flash{
 0%{filter:brightness(1.8);}
 100%{filter:brightness(1);}
}

@media(max-width:800px){
 #app{
  grid-template-columns:1fr;
  padding:12px;
 }

 .value{font-size:24px;}

 button{
  font-size:16px;
  padding:15px;
 }
}
</style>
</head>

<body>

<div id="app">

<section class="panel" id="leftPanel">
<h1>AIと創る文明</h1>
<p class="subtitle">採集・強化・進化・転生で文明を育てる放置クリックゲーム。</p>

<h2>資源</h2>
<div class="resources">
 <div class="resource"><div class="label">食料</div><div class="value" id="food">0</div></div>
 <div class="resource"><div class="label">木材</div><div class="value" id="wood">0</div></div>
 <div class="resource"><div class="label">石材</div><div class="value" id="stone">0</div></div>
 <div class="resource"><div class="label">人口</div><div class="value" id="population">1</div></div>
</div>

<button id="gather" class="main">🔥 今すぐ資源を集める</button>
<button id="farm" class="sub">農場を強化</button>
<button id="lumber" class="sub">伐採所を強化</button>
<button id="quarry" class="sub">採石場を強化</button>
<button id="evolve" class="main">文明進化</button>
<button id="rebirth" class="warn">⚡ 転生（永久強化）</button>

<h3>報酬</h3>
<button id="reward" class="reward">🎁 30秒ブースト報酬</button>
</section>

<section class="panel">
<h2>文明</h2>

<div class="info-box">
 <div>現在：<strong id="era">石器時代</strong></div>
 <div class="progress"><div class="bar" id="bar"></div></div>
 <div id="progressText">進化進行度 0%</div>
</div>

<div class="info-box">
 <h3>生産力</h3>
 <div>農場 Lv.<strong id="farmLevel">0</strong>：食料 <strong id="foodRate">0</strong>/秒</div>
 <div>伐採所 Lv.<strong id="lumberLevel">0</strong>：木材 <strong id="woodRate">0</strong>/秒</div>
 <div>採石場 Lv.<strong id="quarryLevel">0</strong>：石材 <strong id="stoneRate">0</strong>/秒</div>
 <div>永久倍率：x<strong id="bonus">1.0</strong></div>
</div>

<div class="info-box">
 <h3>ミッション</h3>
 <div id="missionArea"></div>
</div>

<h3>AIアドバイス</h3>
<p class="ai" id="ai">まずは採集して、農場を強化しましょう。</p>

<h3>ログ</h3>
<div class="log" id="log">ゲーム開始。</div>

<button id="save" class="sub">セーブ</button>
<button id="reset" class="warn">リセット</button>
</section>

</div>

<script>
const SAVE_KEY = "ai_civ_v09";

const state = {
 food:0,
 wood:0,
 stone:0,
 population:1,
 farms:0,
 lumber:0,
 quarry:0,
 era:0,
 rebirth:0,
 bonus:1,
 boostTime:0,
 combo:0,
 lastGather:0,
 missions:[]
};

const eras = [
 "石器時代",
 "農耕時代",
 "青銅器時代",
 "鉄器時代",
 "中世",
 "産業時代",
 "情報時代",
 "AI文明"
];

const missionPool = [
 {
  id:"gather_food",
  title:"食料を100集める",
  type:"resource",
  key:"food",
  target:100,
  rewardText:"食料 +120",
  reward:()=>{state.food+=120;}
 },
 {
  id:"gather_wood",
  title:"木材を80集める",
  type:"resource",
  key:"wood",
  target:80,
  rewardText:"木材 +100",
  reward:()=>{state.wood+=100;}
 },
 {
  id:"gather_stone",
  title:"石材を50集める",
  type:"resource",
  key:"stone",
  target:50,
  rewardText:"石材 +80",
  reward:()=>{state.stone+=80;}
 },
 {
  id:"farm_lv3",
  title:"農場をLv.3にする",
  type:"level",
  key:"farms",
  target:3,
  rewardText:"永久倍率 +0.1",
  reward:()=>{state.bonus+=0.1;}
 },
 {
  id:"lumber_lv3",
  title:"伐採所をLv.3にする",
  type:"level",
  key:"lumber",
  target:3,
  rewardText:"木材 +200",
  reward:()=>{state.wood+=200;}
 },
 {
  id:"quarry_lv2",
  title:"採石場をLv.2にする",
  type:"level",
  key:"quarry",
  target:2,
  rewardText:"石材 +150",
  reward:()=>{state.stone+=150;}
 },
 {
  id:"evolve_once",
  title:"文明を1回進化させる",
  type:"era",
  key:"era",
  target:1,
  rewardText:"全資源 +150",
  reward:()=>{state.food+=150;state.wood+=150;state.stone+=150;}
 }
];

function $(id){
 return document.getElementById(id);
}

function format(n){
 if(n >= 1e9) return (n/1e9).toFixed(1)+"B";
 if(n >= 1e6) return (n/1e6).toFixed(1)+"M";
 if(n >= 1e3) return (n/1e3).toFixed(1)+"K";
 return Math.floor(n);
}

function logAdd(text){
 $("log").innerHTML = text + "<br>" + $("log").innerHTML;
}

function showPopup(x,y,text){
 const el=document.createElement("div");
 el.className="popup";
 el.textContent=text;
 el.style.left=x+"px";
 el.style.top=y+"px";
 document.body.appendChild(el);
 setTimeout(()=>el.remove(),800);
}

function flash(){
 $("leftPanel").classList.remove("flash");
 void $("leftPanel").offsetWidth;
 $("leftPanel").classList.add("flash");
}

function getBoost(){
 return state.boostTime > 0 ? 10 : 1;
}

function getTotalBonus(){
 return state.bonus * getBoost();
}

function getFoodRate(){
 return state.farms * (1 + state.era * 0.25) * getTotalBonus();
}

function getWoodRate(){
 return state.lumber * (1 + state.era * 0.25) * getTotalBonus();
}

function getStoneRate(){
 return state.quarry * (0.7 + state.era * 0.2) * getTotalBonus();
}

function getCost(base, level){
 return Math.floor(base * Math.pow(1.45, level));
}

function getEvolveCost(){
 const level = state.era + 1;
 return {
  food: level * 120,
  wood: level * 100,
  stone: level * 70
 };
}

function getProgress(){
 const c = getEvolveCost();
 const a = Math.min(state.food / c.food, 1);
 const b = Math.min(state.wood / c.wood, 1);
 const d = Math.min(state.stone / c.stone, 1);
 return Math.floor(((a+b+d)/3)*100);
}

function setupMissions(){
 if(state.missions && state.missions.length > 0) return;
 state.missions = missionPool.slice(0,3).map(m=>({
  ...m,
  progress:0,
  completed:false
 }));
}

function addMissionProgress(type,key,value){
 state.missions.forEach(m=>{
  if(m.completed) return;

  if(m.type==="resource" && type==="resource" && m.key===key){
   m.progress += value;
  }

  if(m.type==="level"){
   m.progress = state[m.key];
  }

  if(m.type==="era"){
   m.progress = state.era;
  }

  if(m.progress >= m.target){
   m.completed = true;
   m.reward();
   logAdd(`🎉 ミッション達成：${m.title} / 報酬：${m.rewardText}`);
   replaceMission(m.id);
   flash();
  }
 });
}

function replaceMission(oldId){
 const currentIds = state.missions.map(m=>m.id);
 const candidates = missionPool.filter(m=>!currentIds.includes(m.id) && m.id!==oldId);

 const nextBase = candidates.length > 0
  ? candidates[Math.floor(Math.random()*candidates.length)]
  : missionPool[Math.floor(Math.random()*missionPool.length)];

 const index = state.missions.findIndex(m=>m.id===oldId);

 state.missions[index] = {
  ...nextBase,
  progress:0,
  completed:false
 };
}

function gain(type,value){
 state[type]+=value;
 addMissionProgress("resource",type,value);
}

function renderMissions(){
 $("missionArea").innerHTML = "";

 state.missions.forEach(m=>{
  const progress = Math.min(m.progress,m.target);
  const percent = Math.floor((progress / m.target) * 100);

  const div = document.createElement("div");
  div.className = "mission-card";
  div.innerHTML = `
   <div class="mission-title">${m.title}</div>
   <div class="progress"><div class="bar" style="width:${percent}%"></div></div>
   <div>${format(progress)} / ${format(m.target)}（${percent}%）</div>
   <div class="mission-reward">報酬：${m.rewardText}</div>
  `;
  $("missionArea").appendChild(div);
 });
}

function update(){
 $("food").textContent = format(state.food);
 $("wood").textContent = format(state.wood);
 $("stone").textContent = format(state.stone);
 $("population").textContent = format(state.population);

 $("era").textContent = eras[state.era] || "最終文明";

 $("farmLevel").textContent = state.farms;
 $("lumberLevel").textContent = state.lumber;
 $("quarryLevel").textContent = state.quarry;

 $("foodRate").textContent = format(getFoodRate());
 $("woodRate").textContent = format(getWoodRate());
 $("stoneRate").textContent = format(getStoneRate());
 $("bonus").textContent = state.bonus.toFixed(1);

 const farmCost = getCost(20,state.farms);
 const lumberCost = getCost(20,state.lumber);
 const quarryCost = getCost(25,state.quarry);

 $("farm").textContent = `農場を強化：食料 ${format(farmCost)}`;
 $("lumber").textContent = `伐採所を強化：木材 ${format(lumberCost)}`;
 $("quarry").textContent = `採石場を強化：石材 ${format(quarryCost)}`;

 $("farm").disabled = state.food < farmCost;
 $("lumber").disabled = state.wood < lumberCost;
 $("quarry").disabled = state.stone < quarryCost;

 const cost = getEvolveCost();
 const p = getProgress();

 $("bar").style.width = p + "%";
 $("progressText").textContent =
  `進化進行度 ${p}% / 必要：食料 ${format(cost.food)} 木材 ${format(cost.wood)} 石材 ${format(cost.stone)}`;

 $("evolve").disabled =
  state.food < cost.food ||
  state.wood < cost.wood ||
  state.stone < cost.stone ||
  state.era >= eras.length - 1;

 if(!$("evolve").disabled){
  $("evolve").classList.add("blink");
 }else{
  $("evolve").classList.remove("blink");
 }

 $("rebirth").disabled = state.era < 2;

 if(state.boostTime > 0){
  $("reward").textContent = `🔥 ブースト中：残り ${Math.ceil(state.boostTime)}秒`;
  $("reward").disabled = true;
 }else{
  $("reward").textContent = "🎁 30秒ブースト報酬";
  $("reward").disabled = false;
 }

 renderMissions();
 updateAI();
}

function updateAI(){
 if(state.era >= eras.length - 1){
  $("ai").textContent = "AI文明に到達しました。転生で永久倍率を伸ばす段階です。";
 }else if(state.farms === 0){
  $("ai").textContent = "最初は農場が最優先です。食料の自動生産を作りましょう。";
 }else if(state.lumber === 0){
  $("ai").textContent = "次は伐採所です。木材を増やすと強化が楽になります。";
 }else if(state.quarry === 0){
  $("ai").textContent = "採石場を作ると進化に必要な石材が安定します。";
 }else if(getProgress() >= 80){
  $("ai").textContent = "進化目前です。足りない資源だけを狙いましょう。";
 }else{
  $("ai").textContent = "ミッションを達成しながら施設を強化すると、効率よく進めます。";
 }
}

$("gather").onclick = (e) => {
 const now = Date.now();

 if(now - state.lastGather < 600){
  state.combo = Math.min(state.combo + 1, 30);
 }else{
  state.combo = 1;
 }

 state.lastGather = now;

 const comboBonus = 1 + state.combo * 0.02;
 const total = getTotalBonus() * comboBonus;

 gain("food",3 * total);
 gain("wood",2 * total);
 gain("stone",1 * total);

 if(navigator.vibrate) navigator.vibrate(10);
 showPopup(e.clientX,e.clientY,`+${format(3*total)} 食料`);
 logAdd(`+${format(3*total)}食料 / +${format(2*total)}木材 / +${format(1*total)}石材`);
 flash();
 update();
};

$("farm").onclick = () => {
 const cost = getCost(20,state.farms);
 if(state.food < cost) return;

 state.food -= cost;
 state.farms++;
 logAdd(`🌾 農場 Lv.${state.farms} に強化`);
 addMissionProgress("level","farms",1);
 update();
};

$("lumber").onclick = () => {
 const cost = getCost(20,state.lumber);
 if(state.wood < cost) return;

 state.wood -= cost;
 state.lumber++;
 logAdd(`🪵 伐採所 Lv.${state.lumber} に強化`);
 addMissionProgress("level","lumber",1);
 update();
};

$("quarry").onclick = () => {
 const cost = getCost(25,state.quarry);
 if(state.stone < cost) return;

 state.stone -= cost;
 state.quarry++;
 logAdd(`⛏ 採石場 Lv.${state.quarry} に強化`);
 addMissionProgress("level","quarry",1);
 update();
};

$("evolve").onclick = () => {
 const cost = getEvolveCost();
 if(state.food < cost.food || state.wood < cost.wood || state.stone < cost.stone) return;
 if(state.era >= eras.length - 1) return;

 state.food -= cost.food;
 state.wood -= cost.wood;
 state.stone -= cost.stone;
 state.era++;
 state.population += 5 + state.era * 2;

 logAdd(`✨ 文明が「${eras[state.era]}」へ進化！`);
 addMissionProgress("era","era",1);
 flash();
 update();
};

$("rebirth").onclick = () => {
 if(state.era < 2) return;

 const ok = confirm("転生すると資源と施設はリセットされますが、永久倍率が上がります。実行しますか？");
 if(!ok) return;

 state.rebirth++;
 state.bonus = 1 + state.rebirth * 0.5;

 state.food = 0;
 state.wood = 0;
 state.stone = 0;
 state.population = 1;
 state.farms = 0;
 state.lumber = 0;
 state.quarry = 0;
 state.era = 0;
 state.boostTime = 0;
 state.combo = 0;
 state.missions = [];

 setupMissions();
 logAdd(`⚡ 転生成功！永久倍率 x${state.bonus.toFixed(1)}`);
 update();
};

$("reward").onclick = () => {
 state.boostTime = 30;
 logAdd("🎁 30秒ブースト開始！生産力10倍！");
 update();
};

$("save").onclick = () => {
 save();
 logAdd("セーブしました。");
};

$("reset").onclick = () => {
 const ok = confirm("本当にリセットしますか？");
 if(!ok) return;

 localStorage.removeItem(SAVE_KEY);
 location.reload();
};

function loop(){
 gain("food",getFoodRate()/10);
 gain("wood",getWoodRate()/10);
 gain("stone",getStoneRate()/10);

 if(state.food > state.population * 25){
  state.population += 0.005 * state.bonus;
 }

 if(state.boostTime > 0){
  state.boostTime -= 0.1;
  if(state.boostTime < 0) state.boostTime = 0;
 }

 addMissionProgress("level","farms",0);
 addMissionProgress("level","lumber",0);
 addMissionProgress("level","quarry",0);
 addMissionProgress("era","era",0);

 update();
}

function save(){
 localStorage.setItem(SAVE_KEY,JSON.stringify(state));
}

function load(){
 const data = localStorage.getItem(SAVE_KEY);
 if(!data) return;

 try{
  Object.assign(state,JSON.parse(data));
 }catch(e){
  console.warn("Save load failed",e);
 }
}

load();
setupMissions();
update();

setInterval(loop,100);
setInterval(save,5000);
</script>

</body>
</html>
